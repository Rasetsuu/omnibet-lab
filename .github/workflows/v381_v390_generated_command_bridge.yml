name: OmniBet v381-v390 Generated Command Bridge

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  generated-command-bridge:
    name: v381-v390 generated command bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Rust local import runner tests
        run: cargo test --manifest-path rust-core/Cargo.toml local_import_runner
      - name: Rust generated report writer tests
        run: cargo test --manifest-path rust-core/Cargo.toml generated_report_writer
      - name: Generate v381-v390 local reports
        run: |
          mkdir -p reports
          cargo run --manifest-path rust-core/Cargo.toml --bin omnibet-local-import-runner -- \
            --root . \
            --report-out reports/generated_v371_v380_green_sample.json \
            --desktop-out tauri-app/src/generated-green-sample.generated.json \
            --storage-manifest-out reports/generated_v371_v380_storage_manifest.json
      - name: Run v371-v380 generated writer smoke
        run: |
          python python_lab/generated_report_writer_smoke.py --root . --out reports/ci_v371_v380_generated_report_writer.json
      - name: Run v381-v390 generated command bridge smoke
        run: |
          python python_lab/generated_command_bridge_smoke.py --root . --out reports/ci_v381_v390_generated_command_bridge.json
      - name: Upload v381-v390 generated command bridge artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v381-v390-generated-command-bridge-artifacts
          path: |
            reports/generated_v371_v380_green_sample.json
            reports/generated_v371_v380_storage_manifest.json
            reports/ci_v371_v380_generated_report_writer.json
            reports/ci_v381_v390_generated_command_bridge.json
            tauri-app/src/generated-green-sample.generated.json
          if-no-files-found: warn
