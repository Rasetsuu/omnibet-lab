name: OmniBet Desktop Beta Diagnostics

on:
  workflow_dispatch:
    inputs:
      build_label:
        description: "Optional diagnostics label"
        required: false
        default: "manual-debug"
  pull_request:
    paths:
      - ".github/workflows/desktop_beta_debug.yml"
      - "tools/desktop_build_diagnostics.py"
      - "tools/run_desktop_build_diagnostics.py"
      - "tauri-app/**"
      - "rust-core/**"
      - "python_lab/desktop_build_manifest.py"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  desktop-diagnostics:
    name: desktop diagnostics (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri desktop dependencies
        if: runner.os == 'Linux'
        continue-on-error: true
        timeout-minutes: 15
        run: |
          set -o pipefail
          mkdir -p build/desktop-diagnostics
          {
            set -eux
            sudo apt-get update -y -o Acquire::Retries=3
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              libgtk-3-dev \
              libwebkit2gtk-4.1-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              patchelf
            pkg-config --modversion gdk-3.0
          } 2>&1 | tee build/desktop-diagnostics/linux-deps.log

      - name: Run desktop build diagnostics
        id: diagnostics
        continue-on-error: true
        run: |
          python tools/run_desktop_build_diagnostics.py --root . --out-dir build/desktop-diagnostics

      - name: Upload desktop diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-desktop-diagnostics-${{ runner.os }}-${{ github.run_number }}
          path: build/desktop-diagnostics/**
          if-no-files-found: warn

      - name: Post diagnostic summary comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const os = process.env.RUNNER_OS || '${{ runner.os }}';
            const marker = `<!-- omnibet-desktop-diagnostics-${os} -->`;
            const bodyMarker = `<!-- omnibet-pr-body-diagnostics-${os} -->`;
            function tail(path, maxLines = 80) {
              if (!fs.existsSync(path)) return '';
              return fs.readFileSync(path, 'utf8').split(/\r?\n/).slice(-maxLines).join('\n');
            }
            let summary = tail('build/desktop-diagnostics/diagnostic-summary.txt', 80);
            if (!summary) summary = 'diagnostic-summary.txt missing; diagnostics may have failed before summary creation.';
            const linuxDeps = tail('build/desktop-diagnostics/linux-deps.log', 80);
            let body = `${marker}\n### OmniBet desktop diagnostics (${os})\n\n`;
            body += '```text\n' + summary.slice(-6000) + '\n```\n';
            if (linuxDeps) {
              body += '\n<details><summary>Linux dependency note/tail</summary>\n\n```text\n';
              body += linuxDeps.slice(-6000);
              body += '\n```\n</details>\n';
            }
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: issue_number });
            const originalBody = pr.data.body || '';
            const blockStart = `${bodyMarker}-start`;
            const blockEnd = `${bodyMarker}-end`;
            const bodyBlock = `${blockStart}\n### Latest desktop diagnostics (${os})\n\n\`\`\`text\n${summary.slice(-3500)}\n\`\`\`\n${blockEnd}`;
            const pattern = new RegExp(`${blockStart}[\\s\\S]*?${blockEnd}\\n?`, 'm');
            let nextBody;
            if (pattern.test(originalBody)) {
              nextBody = originalBody.replace(pattern, `${bodyBlock}\n`);
            } else {
              nextBody = `${bodyBlock}\n\n${originalBody}`;
            }
            await github.rest.pulls.update({ owner, repo, pull_number: issue_number, body: nextBody });

      - name: Fail if diagnostics found build errors
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("build/desktop-diagnostics/build-status.json")
          if not path.exists():
              raise SystemExit("missing build-status.json")
          status = json.loads(path.read_text(encoding="utf-8"))
          if not status.get("ok"):
              print("Failed diagnostic commands:")
              for cmd in status.get("failed_commands", []):
                  print(f"- {cmd.get('name')} status={cmd.get('status')} log={cmd.get('log')}")
              raise SystemExit(1)
          print("All desktop diagnostic commands passed.")
          PY

  desktop-download-artifacts:
    name: desktop downloadable artifacts (${{ matrix.os }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 15
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Validate desktop dependency policy
        shell: bash
        run: |
          set -euo pipefail
          test ! -f tauri-app/package-lock.json
          grep -q 'npm install --foreground-scripts --loglevel warn' .github/workflows/desktop_beta_builds.yml

      - name: Install Tauri dependencies
        working-directory: tauri-app
        run: npm install --foreground-scripts --loglevel warn

      - name: Build Rust CLI runtime
        run: cargo build --manifest-path rust-core/Cargo.toml --release --bins

      - name: Build desktop app
        working-directory: tauri-app
        run: npm run build

      - name: Stage portable desktop package
        shell: bash
        run: |
          set -euo pipefail
          package_dir="build/desktop-downloads/package"
          mkdir -p "$package_dir/bin" "$package_dir/data" "$package_dir/data_packs" "$package_dir/rust-core/target/debug"

          if [ "${{ runner.os }}" = "Windows" ]; then
            app_src="tauri-app/src-tauri/target/release/omnibet_lab.exe"
            app_dst="$package_dir/OmniBet-Lab.exe"
            cli_suffix=".exe"
          else
            app_src="tauri-app/src-tauri/target/release/omnibet_lab"
            app_dst="$package_dir/omnibet-lab"
            cli_suffix=""
          fi

          test -s "$app_src"
          cp "$app_src" "$app_dst"
          chmod +x "$app_dst" || true

          for bin in omnibet-pack omnibet-infer omnibet-value omnibet-model; do
            src="rust-core/target/release/${bin}${cli_suffix}"
            test -s "$src"
            cp "$src" "$package_dir/${bin}${cli_suffix}"
            cp "$src" "$package_dir/bin/${bin}${cli_suffix}"
            cp "$src" "$package_dir/rust-core/target/debug/${bin}"
            chmod +x "$package_dir/${bin}${cli_suffix}" "$package_dir/bin/${bin}${cli_suffix}" "$package_dir/rust-core/target/debug/${bin}" || true
          done

          cp -R data_packs/football_core_v1 "$package_dir/data_packs/football_core_v1"
          cp data/sample_odds_spain_cape_verde.csv "$package_dir/data/sample_odds_spain_cape_verde.csv"
          cp data/sample_prices.csv "$package_dir/data/sample_prices.csv"
          cp data/sample_closing_odds_spain_cape_verde.csv "$package_dir/data/sample_closing_odds_spain_cape_verde.csv"
          cp tauri-app/src/dashboard-data.sample.json "$package_dir/dashboard-data.sample.json"
          cp tauri-app/src/review-data.sample.json "$package_dir/review-data.sample.json"
          cp tauri-app/src/settings-data.sample.json "$package_dir/settings-data.sample.json"

          cat > "$package_dir/README_RUN.txt" <<'EOF'
          OmniBet Lab desktop beta portable package.

          Run OmniBet-Lab.exe on Windows or ./omnibet-lab on Linux from this directory.
          The Rust runtime CLIs are bundled beside the app and in ./bin so the Tauri bridge can find them without OMNIBET_CLI_DIR.

          Paper-only research preview. Do not use outputs as betting recommendations.
          EOF

      - name: Prepare artifact manifest
        shell: bash
        run: |
          mkdir -p build/desktop-downloads
          python python_lab/desktop_build_manifest.py \
            --root . \
            --bundle-dir build/desktop-downloads/package \
            --out build/desktop-downloads/DESKTOP_BUILD_MANIFEST.json \
            --platform "${{ runner.os }}" \
            --build-label "pr-download-validation"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-desktop-download-validation-${{ runner.os }}-${{ github.run_number }}
          path: |
            build/desktop-downloads/package/**
            build/desktop-downloads/DESKTOP_BUILD_MANIFEST.json
            tauri-app/src-tauri/target/release/bundle/**
          if-no-files-found: error
