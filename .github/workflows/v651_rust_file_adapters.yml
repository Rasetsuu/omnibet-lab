name: OmniBet v651 Rust File Adapters

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  v651-rust-file-adapters:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: python python_lab/compile_python_sources.py
      - run: python python_lab/v651_rust_file_adapter_check.py
      - run: cargo test --manifest-path rust-core/Cargo.toml adapter_file_parsers_v651
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v651-rust-file-adapters
          path: |
            reports/ci_v651_rust_file_adapter_check.json
            configs/rust_file_adapters.v651_v680.json
            docs/v651_rust_file_adapters.md
          if-no-files-found: warn
