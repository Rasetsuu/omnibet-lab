name: OmniBet v257 Desktop Surface

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  desktop-surface:
    name: v257 desktop surface
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run desktop surface smoke
        run: |
          mkdir -p reports
          python python_lab/source_terminal_desktop_smoke.py --root . --out reports/ci_v257_desktop_surface.json
      - name: Upload v257 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v257-desktop-surface-report
          path: reports/ci_v257_desktop_surface.json
          if-no-files-found: warn
