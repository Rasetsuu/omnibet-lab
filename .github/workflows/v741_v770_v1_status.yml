name: OmniBet v741-v770 v1 Status

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  v1-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python python_lab/compile_python_sources.py
      - run: python python_lab/v1_status_smoke.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v741-v770-v1-status
          path: |
            reports/ci_v1_status_v741_v770.json
            configs/v1_status.v741_v770.json
            docs/v1_roadmap_status.md
          if-no-files-found: warn
