name: OmniBet v259 Source Generate Refresh

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  source-generate-refresh:
    name: v259 source generate refresh
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run generate refresh smoke
        run: |
          mkdir -p reports
          python python_lab/source_generate_refresh_smoke.py --root . --out reports/ci_v259_source_generate_refresh.json
      - name: Upload v259 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v259-source-generate-refresh-report
          path: reports/ci_v259_source_generate_refresh.json
          if-no-files-found: warn
