name: OmniBet v55-v56 Settings Runs

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: v55-v56 settings and runs smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python compile
        run: |
          cd python_lab
          python -m py_compile *.py adapters/*.py

      - name: Run v55-v56 settings and runs smoke
        run: |
          python python_lab/settings_runs_smoke.py \
            --root . \
            --out reports/ci_v55_v56_settings_runs.json

      - name: Upload settings runs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v55-v56-settings-runs-report
          path: reports/ci_v55_v56_settings_runs.json
          if-no-files-found: warn
