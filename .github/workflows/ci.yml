name: OmniBet CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python + Rust test harness
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show tool versions
        run: |
          python --version
          cargo --version
          rustc --version

      - name: Capture Rust v401 debug output
        run: |
          mkdir -p reports
          set +e
          cargo test --manifest-path rust-core/Cargo.toml historical_source_import 2>&1 | tee reports/debug_ci_cargo_historical_source_import.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" | tee reports/debug_ci_cargo_historical_source_import_exit.txt
          exit ${code}

      - name: Run OmniBet full local test harness
        run: bash tools/run_all_local_tests.sh

      - name: Run v38 outcome truth smoke
        run: |
          cd python_lab
          python settlement_truth_smoke.py \
            --db ../build/omnibet_v38_settlement_truth.sqlite \
            --odds-input ../data/samples/the_odds_api_event_markets_sample.json \
            --state-input ../data/samples/api_football_live_state_sample.json \
            --link-input ../data/samples/provider_event_link_sample.v37.json \
            --out ../reports/ci_v38_settlement_truth.json

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-ci-reports
          path: |
            reports/debug_ci_cargo_historical_source_import.log
            reports/debug_ci_cargo_historical_source_import_exit.txt
            reports/ci_*.json
            reports/v13_synthetic_event_pipeline.json
          if-no-files-found: warn

  desktop-diagnostics:
    name: desktop diagnostics (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'desktop-build-diagnostics' || github.ref_name == 'desktop-build-diagnostics'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 10
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run desktop build diagnostics
        id: diagnostics
        continue-on-error: true
        run: |
          python tools/desktop_build_diagnostics.py --root . --out-dir build/desktop-diagnostics

      - name: Upload desktop diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-desktop-diagnostics-${{ runner.os }}-${{ github.run_number }}
          path: build/desktop-diagnostics/**
          if-no-files-found: warn

      - name: Fail if diagnostics found build errors
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("build/desktop-diagnostics/build-status.json")
          if not path.exists():
              raise SystemExit("missing build-status.json")
          status = json.loads(path.read_text(encoding="utf-8"))
          if not status.get("ok"):
              print("Failed diagnostic commands:")
              for cmd in status.get("failed_commands", []):
                  print(f"- {cmd.get('name')} status={cmd.get('status')} log={cmd.get('log')}")
              raise SystemExit(1)
          print("All desktop diagnostic commands passed.")
          PY
