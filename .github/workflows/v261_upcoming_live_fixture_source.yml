name: OmniBet v261 Upcoming Live Fixture Source

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  upcoming-live-fixture-source:
    name: v261 upcoming live fixture source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run v261 fixture source smoke
        run: |
          mkdir -p reports
          python python_lab/upcoming_live_fixture_source_smoke.py --root . --out reports/ci_v261_upcoming_live_fixture_source.json
      - name: Upload v261 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v261-upcoming-live-fixture-source-report
          path: reports/ci_v261_upcoming_live_fixture_source.json
          if-no-files-found: warn
