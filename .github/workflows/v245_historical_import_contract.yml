name: OmniBet v245 Historical Import Contract

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  historical-import-contract:
    name: v245 historical import contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run historical import contract smoke
        run: |
          mkdir -p reports
          python python_lab/historical_import_contract_smoke.py --root . --out reports/ci_v245_historical_import_contract.json
      - name: Rust historical import contract tests
        run: cargo test --manifest-path rust-core/Cargo.toml historical_import_v245
      - name: Upload historical import contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v245-historical-import-contract-report
          path: reports/ci_v245_historical_import_contract.json
          if-no-files-found: warn
