name: OmniBet Desktop Beta Builds

on:
  workflow_dispatch:
    inputs:
      build_label:
        description: "Optional build label"
        required: false
        default: "manual-beta"
  pull_request:
    paths:
      - ".github/workflows/desktop_beta_builds.yml"
      - "tauri-app/**"
      - "python_lab/desktop_build_manifest.py"

permissions:
  contents: read

jobs:
  desktop-build:
    name: desktop beta build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      BUILD_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.build_label || 'ci-beta' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build desktop app
        working-directory: tauri-app
        run: npm run build

      - name: Prepare artifact manifest
        shell: bash
        run: |
          mkdir -p build/desktop-downloads
          python python_lab/desktop_build_manifest.py \
            --root . \
            --bundle-dir tauri-app/src-tauri/target/release/bundle \
            --out build/desktop-downloads/DESKTOP_BUILD_MANIFEST.json \
            --platform "${{ runner.os }}" \
            --build-label "$BUILD_LABEL"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-desktop-${{ runner.os }}-${{ env.BUILD_LABEL }}
          path: |
            tauri-app/src-tauri/target/release/bundle/**
            build/desktop-downloads/DESKTOP_BUILD_MANIFEST.json
          if-no-files-found: error
