name: OmniBet Desktop Beta Builds

on:
  workflow_dispatch:
    inputs:
      build_label:
        description: "Optional build label"
        required: false
        default: "manual-beta"
  pull_request:
    paths:
      - ".github/workflows/desktop_beta_builds.yml"
      - "tauri-app/**"
      - "python_lab/desktop_build_manifest.py"

permissions:
  contents: read

jobs:
  desktop-build:
    name: desktop beta build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      BUILD_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.build_label || 'ci-beta' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Generate desktop icon
        shell: bash
        run: |
          python - <<'PY'
          import base64
          from pathlib import Path
          icon_png = ""
          out = Path("tauri-app/src-tauri/icons/icon.png")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_bytes(base64.b64decode(icon_png))
          PY

      - name: Build portable desktop app
        id: portable_build
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p build/desktop-downloads
          cargo build --manifest-path tauri-app/src-tauri/Cargo.toml --release > build/desktop-downloads/build.log 2>&1
          status=$?
          cat build/desktop-downloads/build.log
          echo "$status" > build/desktop-downloads/build-status.txt
          exit "$status"

      - name: Stage portable artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/desktop-downloads/package
          if [ "${{ runner.os }}" = "Windows" ]; then
            if [ -f tauri-app/src-tauri/target/release/omnibet_lab.exe ]; then
              cp tauri-app/src-tauri/target/release/omnibet_lab.exe build/desktop-downloads/package/OmniBet-Lab-windows.exe
            fi
          else
            if [ -f tauri-app/src-tauri/target/release/omnibet_lab ]; then
              cp tauri-app/src-tauri/target/release/omnibet_lab build/desktop-downloads/package/omnibet-lab-linux
              chmod +x build/desktop-downloads/package/omnibet-lab-linux
            fi
          fi
          cat > build/desktop-downloads/package/README_RUN.txt <<'EOF'
          OmniBet Lab Desktop beta portable build.
          Run the included executable from this directory when present.
          Paper-only local/offline research preview.
          EOF

      - name: Prepare artifact manifest
        shell: bash
        run: |
          mkdir -p build/desktop-downloads
          python python_lab/desktop_build_manifest.py \
            --root . \
            --bundle-dir build/desktop-downloads/package \
            --out build/desktop-downloads/DESKTOP_BUILD_MANIFEST.json \
            --platform "${{ runner.os }}" \
            --build-label "$BUILD_LABEL" || true

      - name: Upload desktop artifacts and diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-desktop-${{ runner.os }}-${{ env.BUILD_LABEL }}
          path: |
            build/desktop-downloads/package/**
            build/desktop-downloads/DESKTOP_BUILD_MANIFEST.json
            build/desktop-downloads/build.log
            build/desktop-downloads/build-status.txt
          if-no-files-found: warn

      - name: Fail if build failed
        shell: bash
        run: |
          status=$(cat build/desktop-downloads/build-status.txt)
          test "$status" = "0"
