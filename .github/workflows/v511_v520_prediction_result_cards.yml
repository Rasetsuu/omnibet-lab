name: OmniBet v511-v520 Prediction Result Cards

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  prediction-result-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python python_lab/compile_python_sources.py
      - run: python python_lab/prediction_result_cards_smoke.py --root . --out reports/ci_v511_v520_prediction_result_cards.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v511-v520-prediction-result-cards
          path: |
            reports/ci_v511_v520_prediction_result_cards.json
            configs/prediction_result_cards.v511_v520.json
            docs/prediction_result_cards_v511_v520.md
          if-no-files-found: warn
