name: OmniBet v234 Provider Runtime

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  provider-runtime:
    name: v234 provider runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run provider runtime smoke
        run: |
          mkdir -p reports
          python python_lab/provider_runtime_smoke.py --root . --out reports/ci_v234_provider_runtime.json
      - name: Rust provider runtime tests
        run: cargo test --manifest-path rust-core/Cargo.toml provider
      - name: Upload provider runtime report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v234-provider-runtime-report
          path: reports/ci_v234_provider_runtime.json
          if-no-files-found: warn
