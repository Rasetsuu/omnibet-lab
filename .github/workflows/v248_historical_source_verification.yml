name: OmniBet v248 Historical Source Verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  historical-source-verification:
    name: v248 historical source verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run historical source verification smoke
        run: |
          mkdir -p reports
          python python_lab/historical_source_verification_smoke.py --root . --out reports/ci_v248_historical_source_verification.json
      - name: Rust historical source verification tests
        run: cargo test --manifest-path rust-core/Cargo.toml historical_verify_v248
      - name: Upload v248 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v248-historical-source-verification-report
          path: reports/ci_v248_historical_source_verification.json
          if-no-files-found: warn
