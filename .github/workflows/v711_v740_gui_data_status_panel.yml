name: OmniBet v711-v740 GUI Data Status Panel

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gui-data-status-panel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python python_lab/compile_python_sources.py
      - run: python python_lab/gui_data_status_panel_smoke.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v711-v740-gui-data-status-panel
          path: |
            reports/ci_v711_v740_gui_data_status_panel.json
            configs/gui_data_status_panel.v711_v740.json
            docs/gui_data_status_panel_v711_v740.md
          if-no-files-found: warn
