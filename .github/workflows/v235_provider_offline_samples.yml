name: OmniBet v235 Provider Offline Samples

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  provider-offline-samples:
    name: v235 provider offline sample parsers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run offline provider sample smoke
        run: |
          mkdir -p reports
          python python_lab/provider_offline_samples_smoke.py --root . --out reports/ci_v235_provider_offline_samples.json
      - name: Rust offline provider parser tests
        run: cargo test --manifest-path rust-core/Cargo.toml offline_provider_sample
      - name: Upload offline provider sample report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v235-provider-offline-samples-report
          path: reports/ci_v235_provider_offline_samples.json
          if-no-files-found: warn
