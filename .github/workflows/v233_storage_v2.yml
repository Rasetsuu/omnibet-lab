name: OmniBet v233 Storage V2

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  storage-v2:
    name: v233 storage v2 big data smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run storage v2 smoke
        run: |
          mkdir -p reports
          python python_lab/storage_v2_smoke.py --root . --out reports/ci_v233_storage_v2.json
      - name: Rust storage v2 tests
        run: cargo test --manifest-path rust-core/Cargo.toml storage_v2
      - name: Upload storage v2 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v233-storage-v2-report
          path: reports/ci_v233_storage_v2.json
          if-no-files-found: warn
