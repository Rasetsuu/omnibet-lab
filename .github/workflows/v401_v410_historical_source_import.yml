name: OmniBet v401-v410 Historical Source Import

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  historical-source-import:
    name: v401-v410 historical source import
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Rust historical source import tests
        run: cargo test --manifest-path rust-core/Cargo.toml historical_source_import
      - name: Run v401-v410 historical source import smoke
        run: |
          python python_lab/historical_source_import_smoke.py \
            --root . \
            --out reports/ci_v401_v410_historical_source_import.json \
            --validation-out reports/historical_source_import_v401_v410_validation.json
      - name: Upload v401-v410 historical source import artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v401-v410-historical-source-import-artifacts
          path: |
            reports/ci_v401_v410_historical_source_import.json
            reports/historical_source_import_v401_v410_validation.json
            data/historical/v401_v410/historical_import.sample.json
            data/historical/v401_v410/fixtures.sample.json
            data/historical/v401_v410/odds.sample.json
            data/historical/v401_v410/settlements.sample.json
            data/historical/v401_v410/identity_map.sample.json
          if-no-files-found: warn
