name: OmniBet Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v0.6.0-beta.1"
        required: true
      release_name:
        description: "Release title"
        required: false
        default: "OmniBet Lab Desktop Beta"
      prerelease:
        description: "Create as prerelease"
        required: false
        default: "true"
      draft:
        description: "Create as draft release"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  build-desktop:
    name: build desktop release asset (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            archive_name: OmniBet-Lab-Linux
          - os: windows-latest
            platform: Windows
            archive_name: OmniBet-Lab-Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 15
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Validate release dependency policy
        shell: bash
        run: |
          set -euo pipefail
          test ! -f tauri-app/package-lock.json
          grep -q 'npm install --foreground-scripts --loglevel warn' .github/workflows/desktop_release.yml

      - name: Install Tauri dependencies
        working-directory: tauri-app
        run: npm install --foreground-scripts --loglevel warn

      - name: Build Rust CLI runtime
        run: cargo build --manifest-path rust-core/Cargo.toml --release --bins

      - name: Build desktop app
        working-directory: tauri-app
        run: npm run build

      - name: Stage portable desktop package
        shell: bash
        run: |
          set -euo pipefail
          package_dir="build/desktop-release/package"
          mkdir -p \
            "$package_dir/bin" \
            "$package_dir/configs" \
            "$package_dir/data" \
            "$package_dir/data/historical/v451_v460" \
            "$package_dir/data_packs" \
            "$package_dir/docs" \
            "$package_dir/python_lab" \
            "$package_dir/reports" \
            "$package_dir/scripts" \
            "$package_dir/tauri-app/src" \
            "$package_dir/rust-core/target/debug"

          if [ "${{ runner.os }}" = "Windows" ]; then
            app_src="tauri-app/src-tauri/target/release/omnibet_lab.exe"
            app_dst="$package_dir/OmniBet-Lab.exe"
            cli_suffix=".exe"
          else
            app_src="tauri-app/src-tauri/target/release/omnibet_lab"
            app_dst="$package_dir/omnibet-lab"
            cli_suffix=""
          fi

          test -s "$app_src"
          cp "$app_src" "$app_dst"
          chmod +x "$app_dst" || true

          for bin in omnibet-pack omnibet-infer omnibet-value omnibet-model omnibet-local-import-runner omnibet-historical-materialization-runner omnibet-football-data-importer omnibet-feature-count-gate omnibet-baseline-eval; do
            src="rust-core/target/release/${bin}${cli_suffix}"
            test -s "$src"
            cp "$src" "$package_dir/${bin}${cli_suffix}"
            cp "$src" "$package_dir/bin/${bin}${cli_suffix}"
            cp "$src" "$package_dir/rust-core/target/debug/${bin}${cli_suffix}"
            chmod +x "$package_dir/${bin}${cli_suffix}" "$package_dir/bin/${bin}${cli_suffix}" "$package_dir/rust-core/target/debug/${bin}${cli_suffix}" || true
          done

          cp -R data_packs/football_core_v1 "$package_dir/data_packs/football_core_v1"
          cp data/sample_odds_spain_cape_verde.csv "$package_dir/data/sample_odds_spain_cape_verde.csv"
          cp data/sample_prices.csv "$package_dir/data/sample_prices.csv"
          cp data/sample_closing_odds_spain_cape_verde.csv "$package_dir/data/sample_closing_odds_spain_cape_verde.csv"
          test -s data/historical/v451_v460/fixtures.adapter.sample.csv
          test -s data/historical/v451_v460/odds.adapter.sample.csv
          test -s data/historical/v451_v460/settlements.adapter.sample.csv
          test -s data/historical/v451_v460/identity_map.adapter.sample.csv
          cp data/historical/v451_v460/fixtures.adapter.sample.csv "$package_dir/data/historical/v451_v460/fixtures.adapter.sample.csv"
          cp data/historical/v451_v460/odds.adapter.sample.csv "$package_dir/data/historical/v451_v460/odds.adapter.sample.csv"
          cp data/historical/v451_v460/settlements.adapter.sample.csv "$package_dir/data/historical/v451_v460/settlements.adapter.sample.csv"
          cp data/historical/v451_v460/identity_map.adapter.sample.csv "$package_dir/data/historical/v451_v460/identity_map.adapter.sample.csv"
          cp data/historical/v451_v460/adapter_catalog.sample.json "$package_dir/data/historical/v451_v460/adapter_catalog.sample.json"

          cp tauri-app/src/beta-home.sample.json "$package_dir/beta-home.sample.json"
          cp tauri-app/src/dashboard-data.sample.json "$package_dir/dashboard-data.sample.json"
          cp tauri-app/src/review-data.sample.json "$package_dir/review-data.sample.json"
          cp tauri-app/src/settings-data.sample.json "$package_dir/settings-data.sample.json"
          cp tauri-app/src/historical-materialization.sample.json "$package_dir/historical-materialization.sample.json"
          cp tauri-app/src/historical-file-adapter.sample.json "$package_dir/historical-file-adapter.sample.json"
          cp tauri-app/src/beta-home.sample.json "$package_dir/tauri-app/src/beta-home.sample.json"
          cp tauri-app/src/dashboard-data.sample.json "$package_dir/tauri-app/src/dashboard-data.sample.json"
          cp tauri-app/src/review-data.sample.json "$package_dir/tauri-app/src/review-data.sample.json"
          cp tauri-app/src/settings-data.sample.json "$package_dir/tauri-app/src/settings-data.sample.json"
          cp tauri-app/src/historical-materialization.sample.json "$package_dir/tauri-app/src/historical-materialization.sample.json"
          cp tauri-app/src/historical-file-adapter.sample.json "$package_dir/tauri-app/src/historical-file-adapter.sample.json"

          cp configs/beta_open_walk_gui.v491_v500.json "$package_dir/configs/beta_open_walk_gui.v491_v500.json"
          cp configs/historical_file_adapter.v451_v460.json "$package_dir/configs/historical_file_adapter.v451_v460.json"
          cp configs/historical_file_adapter_desktop.v461_v470.json "$package_dir/configs/historical_file_adapter_desktop.v461_v470.json"
          cp configs/historical_materialization_command.v421_v430.json "$package_dir/configs/historical_materialization_command.v421_v430.json"
          cp configs/desktop_beta_release_readiness.v471_v480.json "$package_dir/configs/desktop_beta_release_readiness.v471_v480.json"
          cp configs/football_data_batch_001.v941_v960.json "$package_dir/configs/football_data_batch_001.v941_v960.json"
          cp configs/football_data_batch_002.v991_v1030.json "$package_dir/configs/football_data_batch_002.v991_v1030.json"
          cp configs/football_data_batch_003.v1031_v1060.json "$package_dir/configs/football_data_batch_003.v1031_v1060.json"

          cp docs/beta_vs_model_quality_policy.md "$package_dir/docs/beta_vs_model_quality_policy.md"
          cp docs/beta_open_walk_gui_v491_v500.md "$package_dir/docs/beta_open_walk_gui_v491_v500.md"
          cp docs/desktop_beta_release_readiness_v471_v480.md "$package_dir/docs/desktop_beta_release_readiness_v471_v480.md"
          cp docs/v941_football_data_batch_001.md "$package_dir/docs/v941_football_data_batch_001.md"
          cp docs/v991_football_data_batch_002.md "$package_dir/docs/v991_football_data_batch_002.md"
          cp docs/v1031_football_data_batch_003.md "$package_dir/docs/v1031_football_data_batch_003.md"

          cp scripts/run-omnibet-lab-linux.sh "$package_dir/run-omnibet-lab-linux.sh"
          cp scripts/download_football_data_batch_002.sh "$package_dir/scripts/download_football_data_batch_002.sh"
          cp scripts/run_football_data_batch_002.sh "$package_dir/scripts/run_football_data_batch_002.sh"
          cp scripts/download_football_data_batch_003.sh "$package_dir/scripts/download_football_data_batch_003.sh"
          cp scripts/run_football_data_batch_003.sh "$package_dir/scripts/run_football_data_batch_003.sh"
          chmod +x "$package_dir/run-omnibet-lab-linux.sh" "$package_dir/scripts/"*.sh || true

          cp python_lab/v941_football_data_batch_001_check.py "$package_dir/python_lab/v941_football_data_batch_001_check.py"
          cp python_lab/v991_football_data_batch_002_check.py "$package_dir/python_lab/v991_football_data_batch_002_check.py"
          cp python_lab/v1031_football_data_batch_003_check.py "$package_dir/python_lab/v1031_football_data_batch_003_check.py"
          cp python_lab/v1031_football_data_batch_003_runner.py "$package_dir/python_lab/v1031_football_data_batch_003_runner.py"

          cat > "$package_dir/README_RUN.txt" <<'EOF'
          OmniBet Lab desktop beta release package.

          Windows: run OmniBet-Lab.exe from this directory.
          Linux: run ./run-omnibet-lab-linux.sh from this directory.
          Linux fallback: run ./run-omnibet-lab-linux.sh --software if the WebView opens blank on KDE/Wayland/NVIDIA.
          Direct Linux binary: ./omnibet-lab

          Data batch scripts included in this package:
          - bash scripts/download_football_data_batch_002.sh
          - bash scripts/run_football_data_batch_002.sh
          - bash scripts/download_football_data_batch_003.sh
          - bash scripts/run_football_data_batch_003.sh

          The data scripts write local raw/normalized files under data/local_historical and generated status reports under reports.
          The normal Matches GUI can read reports/feature_counts.json and reports/model_eval.json.

          First screen:
          - Start Here
          - Start with demo
          - Import historical files
          - View materialization
          - World Cup paper lab placeholder

          Included GUI beta panels:
          - Start Here
          - Historical Materialization
          - Historical File Adapter
          - Generated Green
          - Dataset Materialization
          - Storage Writers
          - Walk-Forward Evaluator
          - Baseline Reports
          - Calibration / CLV

          Included local sample assets:
          - tauri-app/src/beta-home.sample.json
          - tauri-app/src/historical-materialization.sample.json
          - tauri-app/src/historical-file-adapter.sample.json
          - data/historical/v451_v460/fixtures.adapter.sample.csv
          - data/historical/v451_v460/odds.adapter.sample.csv
          - data/historical/v451_v460/settlements.adapter.sample.csv
          - data/historical/v451_v460/identity_map.adapter.sample.csv

          The Rust runtime CLIs are bundled beside the app and in ./bin.

          PAPER_ONLY research preview.
          Outputs are not betting recommendations, not staking advice, and not proof of edge.
          GUI beta can move fast; prediction/training engine must move slow.
          Training remains locked until no-leak walk-forward, calibration, CLV, no-vig, reproducibility, and performance gates pass.
          EOF

      - name: Prepare release manifest
        shell: bash
        run: |
          mkdir -p build/desktop-release
          python python_lab/desktop_build_manifest.py \
            --root . \
            --bundle-dir build/desktop-release/package \
            --out build/desktop-release/DESKTOP_BUILD_MANIFEST.json \
            --platform "${{ matrix.platform }}" \
            --build-label "${{ inputs.release_tag }}"
          cp build/desktop-release/DESKTOP_BUILD_MANIFEST.json build/desktop-release/package/DESKTOP_BUILD_MANIFEST.json

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release-assets
          asset_base="${{ matrix.archive_name }}-${{ inputs.release_tag }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            archive_path="build/release-assets/${asset_base}.zip"
            powershell -NoProfile -Command "\$ErrorActionPreference = 'Stop'; \$source = 'build/desktop-release/package/*'; \$dest = '${archive_path}'; Compress-Archive -Path \$source -DestinationPath \$dest -Force"
            test -s "$archive_path"
          else
            tar -C build/desktop-release -czf "build/release-assets/${asset_base}.tar.gz" package
          fi

      - name: Upload built release asset
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-release-${{ matrix.platform }}-${{ inputs.release_tag }}
          path: build/release-assets/*
          if-no-files-found: error

  publish-release:
    name: publish GitHub release
    needs: build-desktop
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built release assets
        uses: actions/download-artifact@v4
        with:
          pattern: omnibet-release-*-${{ inputs.release_tag }}
          path: build/release-assets
          merge-multiple: true

      - name: List release assets
        run: find build/release-assets -maxdepth 2 -type f -print -exec sha256sum {} \;

      - name: Write release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          # OmniBet Lab Desktop Beta

          PAPER_ONLY football prediction/value-research desktop beta.

          Download the archive for your platform, unzip/extract it, and run the app from the extracted package directory:

          - Windows: `OmniBet-Lab.exe`
          - Linux: `./run-omnibet-lab-linux.sh`
          - Linux fallback for blank WebView on KDE/Wayland/NVIDIA: `./run-omnibet-lab-linux.sh --software`

          First screen:
          - Start Here
          - Start with demo
          - Import historical files
          - View materialization
          - World Cup paper lab placeholder

          Included GUI beta panels:
          - Start Here
          - Historical Materialization
          - Historical File Adapter
          - Generated Green
          - Dataset Materialization
          - Storage Writers
          - Walk-Forward Evaluator
          - Baseline Reports
          - Calibration / CLV

          Data batch scripts are included under ./scripts in the extracted package.
          After running them, the Matches GUI can read generated reports/feature_counts.json and reports/model_eval.json.

          This release is a research preview. Outputs are not betting recommendations, not staking advice, and not proof of edge.
          GUI beta can move fast; prediction/training engine must move slow.
          Training remains locked until no-leak walk-forward, calibration, CLV, no-vig, reproducibility, and performance gates pass.
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          name="${{ inputs.release_name }} ${tag}"
          args=(--title "$name" --notes-file RELEASE_NOTES.md --repo "$GH_REPO")
          if [ "${{ inputs.prerelease }}" = "true" ]; then args+=(--prerelease); fi
          if [ "${{ inputs.draft }}" = "true" ]; then args+=(--draft); fi
          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" build/release-assets/* --repo "$GH_REPO" --clobber
            gh release edit "$tag" "${args[@]}"
          else
            gh release create "$tag" build/release-assets/* "${args[@]}"
          fi
