name: OmniBet v86b League Universe

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  league-universe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run league universe smoke
        run: |
          mkdir -p reports build/v87 build/v95 build/v103
          python -m py_compile python_lab/league_universe_smoke.py python_lab/v87_smoke.py python_lab/history_scale_smoke.py python_lab/quality_layer_smoke.py python_lab/rust_core_smoke.py
          python python_lab/league_universe_smoke.py --out reports/ci_v86b_league_universe.json --sample tauri-app/src/league-universe.sample.json
          python python_lab/v87_smoke.py --out-dir build/v87 --ui-sample tauri-app/src/v87.sample.json --out reports/ci_v87.json
          python python_lab/history_scale_smoke.py --out-dir build/v95 --ui-sample tauri-app/src/v95.sample.json --out reports/ci_v95.json
          python python_lab/quality_layer_smoke.py --out-dir build/v103 --ui-sample tauri-app/src/v103.sample.json --out reports/ci_v103.json
          python python_lab/rust_core_smoke.py --root . --ui-sample tauri-app/src/v111.sample.json --out reports/ci_v111.json
      - name: Upload league universe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v86b-league-universe-report
          path: |
            reports/ci_v86b_league_universe.json
            reports/ci_v87.json
            reports/ci_v95.json
            reports/ci_v103.json
            reports/ci_v111.json
          if-no-files-found: warn
