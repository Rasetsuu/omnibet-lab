name: OmniBet v86b League Universe

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  league-universe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run league universe smoke
        run: |
          mkdir -p reports
          python -m py_compile python_lab/league_universe_smoke.py
          python python_lab/league_universe_smoke.py --out reports/ci_v86b_league_universe.json --sample tauri-app/src/league-universe.sample.json
