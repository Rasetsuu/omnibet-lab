name: OmniBet v258 Source Report Generation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  source-report-generation:
    name: v258 source report generation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Generate source report
        run: |
          mkdir -p reports
          python python_lab/source_terminal_generate.py --root . --out reports/ci_v258_generated_source_terminal_report.json
      - name: Run generation smoke
        run: python python_lab/source_terminal_generation_smoke.py --root . --out reports/ci_v258_source_terminal_generation.json
      - name: Upload v258 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v258-source-report-generation
          path: |
            reports/ci_v258_generated_source_terminal_report.json
            reports/ci_v258_source_terminal_generation.json
          if-no-files-found: warn
