name: OmniBet v238 Silver Market Mapping Preview

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  silver-market-mapping-preview:
    name: v238 silver market mapping preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run silver market preview smoke
        run: |
          mkdir -p reports
          python python_lab/silver_market_mapping_preview_smoke.py --root . --out reports/ci_v238_silver_market_mapping_preview.json
      - name: Rust silver market tests
        run: cargo test --manifest-path rust-core/Cargo.toml silver_market
      - name: Upload silver market preview report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v238-silver-market-preview-report
          path: reports/ci_v238_silver_market_mapping_preview.json
          if-no-files-found: warn
