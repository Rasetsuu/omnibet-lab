name: OmniBet v244 Silver Preview Cache

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  silver-preview-cache:
    name: v244 silver preview cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run silver preview cache smoke
        run: |
          mkdir -p reports
          python python_lab/silver_preview_cache_smoke.py --root . --out reports/ci_v244_silver_preview_cache.json
      - name: Rust silver preview cache tests
        run: cargo test --manifest-path rust-core/Cargo.toml silver_cache_v244
      - name: Upload silver preview cache report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v244-silver-preview-cache-report
          path: reports/ci_v244_silver_preview_cache.json
          if-no-files-found: warn
