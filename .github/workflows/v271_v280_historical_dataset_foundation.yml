name: OmniBet v271-v280 Historical Dataset Foundation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  historical-dataset-foundation:
    name: v271-v280 historical dataset foundation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Rust historical dataset foundation test
        run: cargo test --manifest-path rust-core/Cargo.toml historical_dataset_foundation
      - name: Run v271-v280 historical dataset smoke
        run: |
          mkdir -p reports
          python python_lab/historical_dataset_foundation_smoke.py --root . --out reports/ci_v271_v280_historical_dataset_foundation.json
      - name: Upload v271-v280 historical dataset report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v271-v280-historical-dataset-foundation-report
          path: reports/ci_v271_v280_historical_dataset_foundation.json
          if-no-files-found: warn
