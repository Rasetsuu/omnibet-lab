name: OmniBet v255 Provider Normalization Preview

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  provider-normalization-preview:
    name: v255 provider normalization preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run provider normalization preview smoke
        run: |
          mkdir -p reports
          python python_lab/provider_normalization_preview_smoke.py --root . --out reports/ci_v255_provider_normalization_preview.json
      - name: Rust provider normalization preview tests
        run: cargo test --manifest-path rust-core/Cargo.toml provider_normalize_v255
      - name: Upload v255 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v255-provider-normalization-preview-report
          path: reports/ci_v255_provider_normalization_preview.json
          if-no-files-found: warn
