name: OmniBet v861 GUI Counts Status

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  v861-gui-counts-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python python_lab/compile_python_sources.py
      - run: python python_lab/v861_gui_counts_status_check.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v861-gui-counts-status
          path: |
            reports/ci_v861_gui_counts_status.json
            docs/v861_gui_counts_status.md
          if-no-files-found: warn
