name: v921 Rust Feature Count Gate

on:
  pull_request:
    paths:
      - "rust-core/**"
      - "docs/v921_rust_feature_count_gate.md"
      - ".github/workflows/v921_rust_feature_count_gate.yml"
  workflow_dispatch:

jobs:
  rust-feature-count-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run v921 feature count gate tests
        run: cargo test --manifest-path rust-core/Cargo.toml feature_count_gate_v921 -- --nocapture
