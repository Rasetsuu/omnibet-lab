name: OmniBet v771-v800 Local Row Pack Intake

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  local-row-pack-intake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python python_lab/compile_python_sources.py
      - run: python python_lab/local_row_pack_intake_scan.py
      - name: Ensure artifact fallback exists
        if: always()
        run: |
          mkdir -p reports
          test -f reports/ci_v771_v800_local_row_pack_intake.json || printf '{"ok":false,"schema":"omnibet.local_row_pack_intake_artifact_fallback.v771_v800","reason":"primary report missing"}\n' > reports/ci_v771_v800_local_row_pack_intake.json
      - if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v771-v800-local-row-pack-intake-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            reports/ci_v771_v800_local_row_pack_intake.json
            reports/local_row_pack_scan_v771_v800.json
            configs/local_row_pack_intake.v771_v800.json
            docs/local_row_pack_intake_v771_v800.md
            data/local_historical/README.md
          if-no-files-found: warn
