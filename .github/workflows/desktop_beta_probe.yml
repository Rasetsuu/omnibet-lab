name: OmniBet Desktop Fast Probe

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/desktop_beta_probe.yml"
      - "tauri-app/**"
      - "rust-core/**"

permissions:
  contents: read

jobs:
  desktop-probe:
    name: desktop probe (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install minimal Linux desktop packages
        if: runner.os == 'Linux'
        timeout-minutes: 6
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf

      - name: Cargo check Tauri
        timeout-minutes: 5
        run: cargo check --manifest-path tauri-app/src-tauri/Cargo.toml

      - name: NPM install
        timeout-minutes: 5
        working-directory: tauri-app
        run: npm install --foreground-scripts --loglevel warn

      - name: Tauri info
        timeout-minutes: 3
        working-directory: tauri-app
        run: npx tauri info

      - name: Tauri no-bundle build
        timeout-minutes: 6
        working-directory: tauri-app
        run: npm run build -- --no-bundle
