name: OmniBet v262-v265 Source To Context Bridge

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  source-to-context-bridge:
    name: v262-v265 source to context bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run v262-v265 bridge smoke
        run: |
          mkdir -p reports
          python python_lab/source_to_context_bridge_smoke.py --root . --out reports/ci_v262_v265_source_to_context_bridge.json
      - name: Upload v262-v265 bridge report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v262-v265-source-to-context-bridge-report
          path: reports/ci_v262_v265_source_to_context_bridge.json
          if-no-files-found: warn
