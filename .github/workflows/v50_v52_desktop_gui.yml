name: OmniBet v50-v52 Desktop GUI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: v50-v52 desktop GUI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python compile
        run: |
          cd python_lab
          python -m py_compile *.py adapters/*.py

      - name: Run v50-v52 desktop GUI bridge smoke
        run: |
          python python_lab/desktop_gui_bridge_smoke.py \
            --root . \
            --out reports/ci_v50_v52_desktop_gui_bridge.json

      - name: Upload desktop GUI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v50-v52-desktop-gui-report
          path: reports/ci_v50_v52_desktop_gui_bridge.json
          if-no-files-found: warn
