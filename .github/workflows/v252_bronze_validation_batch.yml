name: OmniBet v252 Bronze Validation Batch

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  bronze-validation-batch:
    name: v252 bronze validation batch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run bronze validation batch smoke
        run: |
          mkdir -p reports
          python python_lab/bronze_validation_batch_smoke.py --root . --out reports/ci_v252_bronze_validation_batch.json
      - name: Rust bronze validation batch tests
        run: cargo test --manifest-path rust-core/Cargo.toml bronze_validation_v252
      - name: Upload v252 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v252-bronze-validation-batch-report
          path: reports/ci_v252_bronze_validation_batch.json
          if-no-files-found: warn
