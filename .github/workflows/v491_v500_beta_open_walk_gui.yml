name: OmniBet v491-v500 GUI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  beta-gui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python python_lab/compile_python_sources.py
      - run: python python_lab/beta_open_walk_gui_smoke.py --root . --out reports/ci_v491_v500_beta_open_walk_gui.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v491-v500-gui
          path: |
            reports/ci_v491_v500_beta_open_walk_gui.json
            configs/beta_open_walk_gui.v491_v500.json
            tauri-app/src/beta-home.sample.json
            docs/beta_open_walk_gui_v491_v500.md
          if-no-files-found: warn
