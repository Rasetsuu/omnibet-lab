name: v991 Football-Data Batch 002

on:
  pull_request:
    paths:
      - "configs/football_data_batch_002.v991_v1030.json"
      - "scripts/download_football_data_batch_002.sh"
      - "scripts/run_football_data_batch_002.sh"
      - "python_lab/v991_football_data_batch_002_check.py"
      - "docs/v991_football_data_batch_002.md"
      - ".github/workflows/v991_football_data_batch_002.yml"
  workflow_dispatch:

jobs:
  football-data-batch-002-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python python_lab/compile_python_sources.py
      - name: Check Batch 002 manifest only
        run: python python_lab/v991_football_data_batch_002_check.py
      - name: Upload Batch 002 manifest report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v991-football-data-batch-002-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            reports/ci_v991_v1030_football_data_batch_002.json
            configs/football_data_batch_002.v991_v1030.json
            docs/v991_football_data_batch_002.md
          if-no-files-found: warn
