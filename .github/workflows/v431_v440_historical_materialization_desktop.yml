name: OmniBet v431-v440 Historical Materialization Desktop

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  historical-materialization-desktop:
    name: v431-v440 historical materialization desktop
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run v431-v440 desktop smoke
        run: |
          python python_lab/historical_materialization_desktop_smoke.py \
            --root . \
            --out reports/ci_v431_v440_historical_materialization_desktop.json
      - name: Upload v431-v440 desktop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v431-v440-historical-materialization-desktop-artifacts
          path: |
            reports/ci_v431_v440_historical_materialization_desktop.json
            tauri-app/src/historical-materialization.sample.json
          if-no-files-found: warn
