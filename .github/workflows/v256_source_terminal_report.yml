name: OmniBet v256 Source Terminal Report

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  source-terminal-report:
    name: v256 source terminal report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Python compile
        run: python python_lab/compile_python_sources.py
      - name: Run source terminal report smoke
        run: |
          mkdir -p reports
          python python_lab/source_terminal_report_smoke.py --root . --out reports/ci_v256_source_terminal_report.json
      - name: Rust source terminal report tests
        run: cargo test --manifest-path rust-core/Cargo.toml source_terminal_v256
      - name: Upload v256 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v256-source-terminal-report
          path: reports/ci_v256_source_terminal_report.json
          if-no-files-found: warn
