name: OmniBet v57 Desktop Package Readiness

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-readiness:
    name: v57 package readiness Linux
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python compile
        run: |
          cd python_lab
          python -m py_compile *.py adapters/*.py
      - name: Run v57 package readiness smoke
        run: |
          mkdir -p reports
          python python_lab/desktop_package_readiness_smoke.py --root . --platform-name Linux --out reports/ci_v57_desktop_package_readiness_linux.json
      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v57-desktop-package-readiness-linux
          path: reports/ci_v57_desktop_package_readiness_linux.json
          if-no-files-found: warn

  windows-readiness:
    name: v57 package readiness Windows
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python compile
        run: |
          cd python_lab
          python -m py_compile *.py adapters/*.py
      - name: Run v57 package readiness smoke
        run: |
          mkdir reports
          python python_lab/desktop_package_readiness_smoke.py --root . --platform-name Windows --out reports/ci_v57_desktop_package_readiness_windows.json
      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnibet-v57-desktop-package-readiness-windows
          path: reports/ci_v57_desktop_package_readiness_windows.json
          if-no-files-found: warn
